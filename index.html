<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>南京行程 4/16–4/21</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');
:root{
  --ink:#1a1208;--paper:#faf6ef;--warm:#f0e6d0;--accent:#b5451b;--accent2:#2d6a4f;--accent3:#1d3557;
  --muted:#7a6e60;--border:#d9cebb;--card:#fff9f0;--shadow:rgba(26,18,8,.10);
  --ts:#e8f4d9;--tt:#2d6a4f;--fs:#fde8d8;--ft:#b5451b;--hs:#dce8f5;--ht:#1d3557;--rs:#f0e6ff;--rt:#5b3fa6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:15px;min-height:100vh;}

.nav{background:var(--ink);color:var(--paper);padding:14px 14px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px var(--shadow);}
.nav-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;}
.nav h1{font-family:'Noto Serif TC',serif;font-size:19px;font-weight:700;letter-spacing:2px;}
.nav h1 span{color:#e8c97a;}
.nav-sub{font-size:11px;color:#b0a898;margin-top:2px;display:flex;align-items:center;gap:6px;}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;}
.page-tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,.08);}
.page-tabs:last-of-type{border-bottom:none;}
.page-tabs::-webkit-scrollbar{display:none;}
.ptab{background:none;color:#9a8e82;border:none;border-bottom:3px solid transparent;padding:8px 0;font-size:12px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;transition:all .2s;flex:1;text-align:center;}
.ptab.active{color:#fff;border-bottom-color:var(--accent);}

.main{padding:14px 14px 80px;max-width:700px;margin:0 auto;}
.page-section{display:none;}.page-section.active{display:block;}

.day-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px;}
.dtab{background:var(--warm);color:var(--muted);border:1px solid var(--border);border-radius:18px;padding:4px 12px;font-size:11px;cursor:pointer;white-space:nowrap;line-height:1.5;transition:all .2s;}
.dtab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.day-section{display:none;}.day-section.active{display:block;}
.day-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;color:var(--accent);margin-bottom:8px;padding-bottom:7px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px;}
.date-badge{background:var(--accent);color:#fff;font-size:10px;padding:2px 9px;border-radius:20px;}
.day-cost-bar{background:var(--warm);border:1px solid var(--border);border-radius:9px;padding:7px 12px;margin-bottom:11px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);}
.day-cost-bar strong{color:var(--accent);font-family:'Noto Serif TC',serif;font-size:14px;}
.day-cost-twd{font-size:11px;color:var(--muted);margin-left:4px;}
.rate-bar{display:flex;align-items:center;gap:6px;background:var(--hs);border-radius:7px;padding:5px 10px;margin-bottom:11px;font-size:11px;color:var(--ht);}
.rate-input{border:1px solid #b0c8e8;border-radius:5px;padding:2px 6px;font-size:11px;width:52px;font-family:'Noto Sans TC',sans-serif;background:#fff;color:var(--ink);outline:none;text-align:center;}
.cost-twd{font-size:10px;color:var(--accent2);margin-left:3px;white-space:nowrap;}
.meals-block{display:none;}
.cards{display:flex;flex-direction:column;gap:10px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;box-shadow:0 2px 7px var(--shadow);}
.card-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;}
.cost-row{display:flex;align-items:center;gap:5px;margin-top:7px;padding-top:6px;border-top:1px dashed var(--border);}
.cost-label{font-size:11px;color:var(--muted);}
.cost-input{border:1px solid var(--border);border-radius:6px;padding:3px 7px;font-size:12px;width:80px;font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);outline:none;}
.cost-input:focus{border-color:var(--accent);}
.cost-unit{font-size:11px;color:var(--muted);}
.curr-toggle{background:none;border:1px solid var(--border);border-radius:5px;padding:3px 5px;font-size:11px;cursor:pointer;color:var(--accent3);transition:all 0.15s;}
.curr-toggle:hover{background:var(--warm);}
.type-tag{font-size:11px;font-weight:500;border-radius:5px;padding:2px 7px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.tag-sight{background:var(--ts);color:var(--tt);}.tag-food{background:var(--fs);color:var(--ft);}
.tag-hotel{background:var(--hs);color:var(--ht);}.tag-transit{background:var(--rs);color:var(--rt);}
.card-name{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:600;flex:1;line-height:1.4;cursor:pointer;}
.card-actions{display:flex;gap:5px;flex-shrink:0;}
.icon-btn{background:none;border:1px solid var(--border);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}
.info-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);margin-bottom:4px;}
.info-val{flex:1;cursor:pointer;word-break:break-all;}.info-val:hover{color:var(--accent);}
.btn-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.map-btn{display:inline-flex;align-items:center;gap:4px;background:var(--accent2);color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;text-decoration:none;transition:background .2s;}
.map-btn:hover{background:#1d4d38;}.map-btn.cb{background:var(--accent3);}
.note-box{margin-top:7px;background:var(--warm);border-radius:7px;padding:6px 10px;font-size:11px;color:var(--muted);border-left:3px solid var(--border);}
.empty-day{text-align:center;padding:34px;color:var(--muted);font-size:13px;}

/* ── TIMELINE ── */
.timeline{position:relative;padding-left:30px;padding-bottom:4px;}
.timeline::before{content:'';position:absolute;left:11px;top:6px;bottom:6px;width:2px;background:linear-gradient(to bottom,var(--border),var(--border));}
.tl-item{position:relative;margin-bottom:10px;}
.tl-dot{position:absolute;left:-23px;top:12px;width:14px;height:14px;border-radius:50%;border:2px solid var(--paper);z-index:1;}
.tl-dot.sight{background:var(--tt);}
.tl-dot.food{background:var(--ft);}
.tl-dot.hotel{background:var(--ht);}
.tl-dot.transit{background:var(--rt);}
.tl-dot.meal{background:#e8a020;}
.tl-meal{background:var(--warm);border:1px solid var(--border);border-radius:10px;padding:9px 11px;transition:border-color .15s;}
.tl-meal.expanded{border-color:#e8a020;}
.tl-meal-hd{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;}
.tl-meal-icon{font-size:16px;flex-shrink:0;}
.tl-meal-label{font-size:12px;font-weight:600;color:#b87010;}
.tl-meal-preview{font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tl-meal-chevron{color:var(--muted);font-size:10px;transition:transform .2s;margin-left:auto;flex-shrink:0;}
.tl-meal.expanded .tl-meal-chevron{transform:rotate(180deg);}
.tl-meal-body{display:none;margin-top:9px;padding-top:8px;border-top:1px dashed #e8c87a;}
.tl-meal.expanded .tl-meal-body{display:block;}
.meal-input-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.meal-input-row:last-child{margin-bottom:0;}
.meal-icon-lbl{font-size:14px;flex-shrink:0;width:20px;text-align:center;}
.meal-input{flex:1;border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:12px;font-family:'Noto Sans TC',sans-serif;color:var(--ink);outline:none;background:var(--card);}
.meal-input:focus{border-color:#e8a020;}
.tl-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 12px;box-shadow:0 1px 5px var(--shadow);}

/* CHECKLIST */
.cl-section{margin-bottom:18px;}
.section-hd{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;margin-bottom:9px;padding-bottom:6px;border-bottom:2px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.section-hd.blue{color:var(--accent3);}.section-hd.green{color:var(--accent2);}.section-hd.red{color:var(--accent);}
.prog{font-size:11px;color:var(--muted);font-family:'Noto Sans TC',sans-serif;font-weight:400;}
.cl-list{display:flex;flex-direction:column;gap:6px;}
.cl-item{display:flex;align-items:flex-start;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 11px;cursor:pointer;transition:all .2s;}
.cl-item.done{background:var(--ts);border-color:#b8d9a0;opacity:.72;}.cl-item.done .cl-text{text-decoration:line-through;color:var(--muted);}
.cl-item.urg{border-left:3px solid var(--accent);}
.cl-chk{width:19px;height:19px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .2s;}
.cl-item.done .cl-chk{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.cl-text{flex:1;font-size:13px;line-height:1.4;}
.cl-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.cl-badge{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.bu{background:#fde8d8;color:var(--ft);}.bo{background:var(--ts);color:var(--tt);}.bi{background:var(--hs);color:var(--ht);}

/* SPECIAL LIST */
.sl-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:5px;}
.sl-item{display:flex;align-items:flex-start;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px 10px;cursor:pointer;transition:all .2s;}
.sl-item.done{background:var(--ts);border-color:#b8d9a0;}.sl-item.done .sn{text-decoration:line-through;color:var(--muted);}
.sl-chk{width:17px;height:17px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .2s;}
.sl-item.done .sl-chk{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.sn{font-size:12px;font-weight:500;line-height:1.3;}.snt{font-size:10px;color:var(--muted);margin-top:2px;}
.sec-note{font-size:12px;color:var(--muted);margin-bottom:11px;padding:8px 11px;background:var(--warm);border-radius:8px;border-left:3px solid var(--border);line-height:1.5;}

/* PAY */
.pay-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.pay-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;text-align:center;}
.pc-name{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;margin-bottom:4px;}
.pc-amt{font-size:20px;font-weight:700;color:var(--accent);font-family:'Noto Serif TC',serif;}
.pc-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.pay-bal{background:var(--warm);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;margin-bottom:13px;font-size:13px;color:var(--ink);}
.pay-bal strong{color:var(--accent);font-size:15px;}
.pay-form{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:13px;}
.pf-title{font-size:13px;font-weight:600;color:var(--accent3);margin-bottom:9px;}
.pf-row{display:grid;gap:7px;margin-bottom:7px;}
.pf-row.two{grid-template-columns:1fr 1fr;}
.pi{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);outline:none;}
.pi:focus{border-color:var(--accent);}
.split-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.sb{border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-size:11px;background:var(--paper);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;}
.sb.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.pay-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px;font-size:14px;font-family:'Noto Serif TC',serif;cursor:pointer;}
.pay-btn:hover{background:#8f3314;}
.pay-records{display:flex;flex-direction:column;gap:7px;}
.pr{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:9px;}
.pr-ico{font-size:17px;flex-shrink:0;}
.pr-body{flex:1;min-width:0;}
.pr-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.pr-meta{font-size:11px;color:var(--muted);}
.pm-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-right:3px;}
.pm-wechat{background:#e8f5e0;color:#2d7a1f;}.pm-alipay{background:#e0eeff;color:#1a5fb4;}
.pm-card{background:#fff0e0;color:#b56010;}.pm-cash{background:#f5f0e0;color:#8a7020;}
.pr-amt{font-size:15px;font-weight:700;color:var(--accent);font-family:'Noto Serif TC',serif;white-space:nowrap;}
.pr-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:2px;}
.pr-del:hover{color:#c0392b;}
.pr-edit{background:none;border:none;color:#aaa;cursor:pointer;font-size:14px;padding:2px;margin-right:2px;}
.pr-edit:hover{color:var(--accent);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,18,8,.55);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--paper);border-radius:18px 18px 0 0;width:100%;max-width:700px;padding:20px 16px 28px;max-height:92vh;overflow-y:auto;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(60px);opacity:0;}to{transform:none;opacity:1;}}
.modal h2{font-family:'Noto Serif TC',serif;font-size:16px;margin-bottom:14px;color:var(--accent);}
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-family:'Noto Sans TC',sans-serif;background:var(--card);color:var(--ink);outline:none;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);}
.fg textarea{resize:vertical;min-height:52px;}
.modal-btns{display:flex;gap:8px;margin-top:14px;}
.btn-save{flex:1;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px;font-size:14px;font-family:'Noto Serif TC',serif;cursor:pointer;}
.btn-cancel{flex:0 0 auto;background:var(--warm);color:var(--muted);border:1px solid var(--border);border-radius:9px;padding:10px 16px;font-size:13px;cursor:pointer;}
.btn-del{flex:0 0 auto;background:none;color:#c0392b;border:1px solid #e8b4ae;border-radius:9px;padding:10px 13px;font-size:13px;cursor:pointer;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;z-index:999;transition:transform .3s;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

.btn-pick-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:2px;}
.bp{border:1px solid var(--border);border-radius:8px;padding:7px 11px;font-size:12px;background:var(--paper);cursor:pointer;font-family:'Noto Sans TC',sans-serif;color:var(--muted);transition:all .15s;white-space:nowrap;}
.bp:active{transform:scale(.96);}
.bpa{background:var(--accent);color:#fff;border-color:var(--accent);}

/* LEDGER */
.ledger-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.ls-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 10px;text-align:center;}
.ls-label{font-size:10px;color:var(--muted);margin-bottom:3px;}
.ls-amt{font-size:20px;font-weight:700;color:var(--accent);font-family:'Noto Serif TC',serif;line-height:1.2;}
.ls-twd{font-size:10px;color:var(--accent2);margin-top:2px;}
.ledger-group{margin-bottom:16px;}
.lg-head{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;color:var(--accent3);margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.lg-total{font-size:11px;color:var(--muted);font-weight:400;}
.ledger-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:9px;margin-bottom:5px;font-size:12px;}
.lr-icon{font-size:15px;flex-shrink:0;}
.lr-body{flex:1;min-width:0;}
.lr-name{font-weight:500;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lr-meta{font-size:10px;color:var(--muted);}
.lr-amt{font-size:14px;font-weight:700;color:var(--accent);font-family:'Noto Serif TC',serif;white-space:nowrap;}
.lr-twd{font-size:10px;color:var(--accent2);display:block;text-align:right;}
.lr-src-trip{border-left:3px solid var(--tt);}
.lr-src-pay{border-left:3px solid var(--ft);}

</style>
</head>
<body>

<div class="nav">
  <div class="nav-top">
    <div>
      <h1>🏯 <span>南京</span> 旅行手帳</h1>
      <div class="nav-sub">
          4/16–4/21 · 若佩 × 品郡 &nbsp;·&nbsp; <span id="syncDot" title="連線狀態">🔄 連線中...</span>
      </div>
    </div>
    <button class="add-btn" id="addBtn" onclick="openAddModal()">＋ 新增</button>
  </div>
  <div class="page-tabs">
    <button class="ptab active" onclick="switchPage('itinerary',this)">🗓 行程</button>
    <button class="ptab" onclick="switchPage('disney',this)">🎠 迪士尼</button>
    <button class="ptab" onclick="switchPage('food',this)">🦆 南京必吃</button>
  </div>
  <div class="page-tabs">
    <button class="ptab" onclick="switchPage('ledger',this)">📋 預估旅費</button>
    <button class="ptab" onclick="switchPage('pay',this)">💰 分帳</button>
    <button class="ptab" onclick="switchPage('calc',this)">🧮 分攤計算</button>
  </div>
</div>

<div class="main">
  <div class="page-section active" id="page-itinerary">
    <div class="day-tabs" id="dayTabs"></div>
    <div id="dayContent"></div>
  </div>
  <div class="page-section" id="page-checklist"><div id="clContent"></div></div>
  <div class="page-section" id="page-disney">
    <div class="sec-note">💡 <b>2026 逢上海迪士尼「10週年慶典（加你更奇妙）」！</b><br>人潮極多，強烈建議提早買好「早享卡」或「尊享卡(快速通關)」。<br>入園後別忘了去遊客中心領免費的 10週年生日徽章喔！</div>
    <div id="disneyContent"></div>
  </div>
  <div class="page-section" id="page-food">
    <div class="sec-note">🦆 最新 2026 南京美食攻略地圖！點擊記錄你們已吃過的美食。</div>
    <div id="foodContent"></div>
  </div>
  <div class="page-section" id="page-pay">
    <div id="paySummary"></div>
    <div class="pay-form" style="margin-bottom: 12px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
          <label style="font-size:13px;font-weight:600;color:var(--accent3);">💱 全局記帳匯率 (雙向同步)</label>
          <a href="https://rate.bot.com.tw/xrt?Lang=zh-TW" target="_blank" style="font-size:11px;color:var(--accent2);text-decoration:none;display:flex;align-items:center;gap:3px;">
              <span>🔍</span>查詢最新匯率
          </a>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">此匯率將同步計算「行程」與「預估旅費」的台幣總額。</div>
      <div style="display:flex; align-items:center; gap:8px;">

function calcTotals(){
  let rBearRmb=0, pBearRmb=0, rPaidRmb=0, pPaidRmb=0;
  let rBearTwd=0, pBearTwd=0, rPaidTwd=0, pPaidTwd=0;

  pays.forEach(x=>{
    let amt = x.amt;
    let isTwd = (x.currency === 'twd');
    
    let rB=0, pB=0;
    let rP=0, pP=0;

    if(x.payer === '各付各的') {
        rB = amt; pB = amt;
        rP = amt; pP = amt;
    } else {
        if(x.split==='half'){ rB=amt/2; pB=amt/2; }
        else if(x.split==='ruopei'){ rB=amt; }
        else if(x.split==='pinjun'){ pB=amt; }
        else if(x.split==='ar'){ pB=amt; } 
        else if(x.split==='ap'){ rB=amt; } 
        else if(x.split==='cr'){ rB=amt; } 
        else if(x.split==='cp'){ pB=amt; }

        if(x.payer === '若佩') { rP = amt; }
        else if(x.payer === '品郡') { pP = amt; }
        else if(x.split === 'ar') { rP = amt; } 
        else if(x.split === 'ap') { pP = amt; }
    }

    if(isTwd){
        rBearTwd += rB; pBearTwd += pB; rPaidTwd += rP; pPaidTwd += pP;
    } else {
        rBearRmb += rB; pBearRmb += pB; rPaidRmb += rP; pPaidRmb += pP;
    }
  });

  return { rBearRmb, pBearRmb, rPaidRmb, pPaidRmb, rBearTwd, pBearTwd, rPaidTwd, pPaidTwd };
}

const DAY_MEALS={ 0:['d'], 1:['b','l','d'], 2:['b','l','d'], 3:['b','l','d'], 4:['b','l','d'], 5:['l'] };
const MEAL_DEF={ b:{slot:'b',icon:'🌅',label:'早餐'}, l:{slot:'l',icon:'☀️',label:'午餐'}, d:{slot:'d',icon:'🌙',label:'晚餐'} };
const MEAL_TIME={ b:'08:00', l:'12:30', d:'18:30' };

function buildTimeline(dayIdx){
  const its=trips.filter(x=>x.day===dayIdx);
  const m=meals[dayIdx]||{};
  const nodes=its.map((x)=>({type:'trip', time: x.time || '12:00', data:x}));
  
  (DAY_MEALS[dayIdx]||[]).forEach(k=>{
    const def=MEAL_DEF[k];
    let mTime = MEAL_TIME[k];
    if(dayIdx === 5 && k === 'l') mTime = '11:30';
    nodes.push({type:'meal', time: mTime, slot:def.slot, icon:def.icon, label:def.label, val:m[k]||'', cost:m[k+'c']||0});
  });
  
  // Sort all items (trips and meals) chronologically by time
  nodes.sort((a,b)=>a.time.localeCompare(b.time));
  return nodes;
}

function getDayCostHtml(day) {
    const dayIts = trips.filter(x=>x.day===day);
    const dayRmb = dayIts.filter(x=>x.curr!=='twd').reduce((s,x)=>s+(x.cost||0),0) + (DAY_MEALS[day]||[]).reduce((s,k)=>s+((meals[day]&&meals[day][k+'c'])||0),0);
    const dayTwd = dayIts.filter(x=>x.curr==='twd').reduce((s,x)=>s+(x.cost||0),0);
    
    if (dayRmb === 0 && dayTwd === 0) return '';
    const twdEq = dayTwd + twd(dayRmb);
    const rmbEq = dayRmb + (dayTwd / cnyToTwd);
    
    if(dayRmb > 0 && dayTwd > 0) return `¥${dayRmb.toFixed(0)} + NT$${dayTwd.toFixed(0)} <span class="day-cost-twd">≈ NT$${Math.round(twdEq)}</span>`;
    if(dayRmb > 0) return `¥${dayRmb.toFixed(0)} <span class="day-cost-twd">≈ NT$${Math.round(twdEq)}</span>`;
    return `NT$${dayTwd.toFixed(0)} <span class="day-cost-twd">≈ ¥${rmbEq.toFixed(1)}</span>`;
}

function renderPay(){
  const totals = calcTotals();
  
  const grandTotalRmb = (totals.rBearRmb + totals.pBearRmb).toFixed(0);
  const grandTotalTwd = (totals.rBearTwd + totals.pBearTwd).toFixed(0);

  const rBalRmb = totals.rPaidRmb - totals.rBearRmb; 
  const pBalRmb = totals.pPaidRmb - totals.pBearRmb;
  const rBalTwd = totals.rPaidTwd - totals.rBearTwd;
  const pBalTwd = totals.pPaidTwd - totals.pBearTwd;

  const rFinalTwd = rBalTwd + twd(rBalRmb);
  const pFinalTwd = pBalTwd + twd(pBalRmb);

  let balText = '兩人目前無欠款 🎉';
  if (rFinalTwd > 0) {
      balText = `品郡應給若佩 <strong style="font-size:22px;">NT$${Math.round(rFinalTwd)}</strong> <div style="font-size:12px;color:var(--muted);margin-top:6px;">(含台幣差額 NT$${Math.round(rBalTwd)} + 人民幣差額 ¥${rBalRmb.toFixed(1)} 換算)</div>`;
  } else if (pFinalTwd > 0) {
      balText = `若佩應給品郡 <strong style="font-size:22px;">NT$${Math.round(pFinalTwd)}</strong> <div style="font-size:12px;color:var(--muted);margin-top:6px;">(含台幣差額 NT$${Math.round(pBalTwd)} + 人民幣差額 ¥${pBalRmb.toFixed(1)} 換算)</div>`;
  } else if (totals.rPaidRmb === 0 && totals.pPaidRmb === 0 && totals.rPaidTwd === 0 && totals.pPaidTwd === 0 && (totals.rBearRmb > 0 || totals.pBearRmb > 0 || totals.rBearTwd > 0 || totals.pBearTwd > 0)) {
      balText = '<span style="font-size:12px;color:var(--accent);">⚠️ 請指定「付款人」才能結算代墊差額喔</span>';

    const numDisplay = isSelfPaid ? `${x.amt.toFixed(0)} <span style="font-size:11px;font-weight:normal">/人</span>` : x.amt.toFixed(0);
    const amtColor = isTwd ? 'color:var(--accent3);' : '';

    const payerDisplay = x.payer ? (isSelfPaid ? ' · 各自結清' : ` · ${eh(x.payer)}墊付`) : '';
    const splitText = isSelfPaid ? '兩人皆消費' : ({half:'兩人共同',ruopei:'若佩個人',pinjun:'品郡個人',ar:'若佩代全付',ap:'品郡代全付'}[x.split]||x.split);
    const timeHtml = x.time ? `<div style="font-size:10px; color:#aaa; margin-top:4px;">🕒 ${ftm(x.time)}</div>` : '';

    return `<div class="pr">
      <div class="pr-ico">${PI[x.method]||'💴'}</div>
      <div class="pr-body">
        <div class="pr-name">${eh(x.name)}</div>
        <div class="pr-meta"><span class="pm-tag ${PC[x.method]||''}">${PM[x.method]||x.method}</span>${splitText}${payerDisplay}
        ${x.note?` <br><span style="opacity:0.7">💬 ${eh(x.note)}</span>`:''}
        ${timeHtml}

      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="text-align:right;">
          <div class="pr-amt" style="${amtColor}">${sym}${numDisplay}</div>

        <button class="pr-edit" onclick="editPay(${x.id})">✏️</button>
        <button class="pr-del" onclick="delPay(${x.id})">×</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('paySummary').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:16px;font-weight:700;color:var(--ink);">💰 雙人分帳與結算</div>
        <button onclick="exportToExcel()" style="background:var(--accent2);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px" title="下載所有資料為完整的 Excel 檔案">📤 匯出 Excel</button>
    </div>
    <div class="pay-cards">
      <div class="pay-card">
        <div class="pc-name">若佩</div>
        <div class="pc-amt">¥${totals.rBearRmb.toFixed(0)}</div>
        <div class="pc-amt" style="font-size:20px;color:var(--accent3);margin-top:2px;">NT$${totals.rBearTwd.toFixed(0)}</div>
        <div style="font-size:11px;color:var(--accent2);margin-bottom:4px;margin-top:6px;">≈ 總計 NT$${Math.round(totals.rBearTwd + twd(totals.rBearRmb))}</div>
        <div class="pc-sub">應負擔總額</div>
      </div>
      <div class="pay-card">
        <div class="pc-name">品郡</div>
        <div class="pc-amt">¥${totals.pBearRmb.toFixed(0)}</div>
        <div class="pc-amt" style="font-size:20px;color:var(--accent3);margin-top:2px;">NT$${totals.pBearTwd.toFixed(0)}</div>
        <div style="font-size:11px;color:var(--accent2);margin-bottom:4px;margin-top:6px;">≈ 總計 NT$${Math.round(totals.pBearTwd + twd(totals.pBearRmb))}</div>
        <div class="pc-sub">應負擔總額</div>
      </div>
    </div>
    <div class="pay-bal" style="line-height:1.6;">
        兩人總支出 <strong>¥${grandTotalRmb}</strong> ＋ <strong style="color:var(--accent3)">NT$${grandTotalTwd}</strong>
        <div style="font-size:12px;color:var(--muted);font-weight:normal;margin-top:4px;">≈ 總計 NT$${Math.round(parseInt(grandTotalTwd) + twd(parseFloat(grandTotalRmb)))}</div>
        <div style="margin-top:10px; padding-top:10px; border-top:1px dashed var(--border); font-size:15px;">
            ${balText}
        </div>
    </div>
  `;

  document.getElementById('payBottom').innerHTML=`
    <div class="pay-form">
      <div class="pf-title">${editingPayId ? '✏️ 編輯支出' : '＋ 新增支出'}</div>
      <div id="payFormBody"></div>
    </div>
    <div class="pay-records">${pays.length?recs:'<div style="text-align:center;padding:28px;color:var(--muted);font-size:13px">還沒有支出記錄</div>'}</div>
  `;

  const rEl = document.getElementById('globalRateRmb');
  const tEl = document.getElementById('globalRateTwd');
  if(rEl && document.activeElement !== rEl) rEl.value = cnyToTwd;
  if(tEl && document.activeElement !== tEl) tEl.value = (1/cnyToTwd).toFixed(3);

  renderPayForm();
}

      <button class="bp${payPayer==='若佩'?' bpa':''}" onclick="setPayPayer('若佩')">若佩墊付</button>
      <button class="bp${payPayer==='品郡'?' bpa':''}" onclick="setPayPayer('品郡')">品郡墊付</button>
      <button class="bp${payPayer==='各付各的'?' bpa':''}" onclick="setPayPayer('各付各的')">各付各的 (當下結清)</button>
      <button class="bp${payPayer===''?' bpa':''}" style="${payPayer===''?'border-color:var(--accent);color:var(--accent);':''}" onclick="setPayPayer('')">未指定</button>
    </div>

    <div id="splitSection" style="${isSelfPaid ? 'display:none;' : ''}">

        <div class="btn-pick-row" style="margin-bottom:10px">
          <button class="bp${splitMode==='half'?' bpa':''}" onclick="ssm('half')">兩人共同</button>
          <button class="bp${splitMode==='ruopei'?' bpa':''}" onclick="ssm('ruopei')">若佩個人</button>
          <button class="bp${splitMode==='pinjun'?' bpa':''}" onclick="ssm('pinjun')">品郡個人</button>
        </div>
    </div>

    <div style="font-size:11px;color:var(--muted);margin-bottom:5px">付款方式：</div>
    <div class="btn-pick-row" style="margin-bottom:10px">
      ${['wechat','alipay','card','cash'].map(m=>`<button class="bp${payMethod===m?' bpa':''}" onclick="setPayMethod('${m}')">${mLabels[m]}</button>`).join('')}
    </div>

    <div class="pf-row"><input class="pi" id="pnt" placeholder="備註（選填）" value="${eh(currNote)}"></div>
    <button class="pay-btn" onclick="addPay()">${editingPayId ? '儲存修改' : '記帳'}</button>
    ${editingPayId ? `<button class="btn-cancel" style="width:100%;margin-top:8px;padding:10px;" onclick="cancelEditPay()">取消編輯</button>` : ''}`;

function addPay(){
  const n=document.getElementById('pn')?.value.trim();
  const a=parseFloat(document.getElementById('pa')?.value);
  if(!n||isNaN(a)||a<=0){showT('請填寫完整名稱與金額');return;}
  
  if(editingPayId) {
      const idx = pays.findIndex(x => x.id === editingPayId);
      if (idx !== -1) {
          pays[idx] = { ...pays[idx], name:n, amt:a, currency:payCurrency, method:payMethod, payer:payPayer, note:(document.getElementById('pnt')?.value||'').trim(), split:splitMode };
      }
      editingPayId = null;
      showT(`✓ 已更新：${n}`);
  } else {
      pays.push({
        id:pid++,
        name:n,
        amt:a,
        currency:payCurrency,
        method:payMethod,
        payer:payPayer,
        note:(document.getElementById('pnt')?.value||'').trim(),
        split:splitMode,
        time: Date.now()
      });
      showT(`✓ 已記錄：${n} ${payCurrency==='twd'?'NT$':'¥'}${a.toFixed(0)}`);
  }
  
  if(document.getElementById('pn')) document.getElementById('pn').value = '';
  if(document.getElementById('pa')) document.getElementById('pa').value = '';
  if(document.getElementById('pnt')) document.getElementById('pnt').value = '';

  if(window.sv) window.sv();
  renderPay();
}

function delPay(id){
    customConfirm('確定要刪除這筆支出嗎？', () => {
        pays=pays.filter(x=>x.id!==id);
        if(window.sv) window.sv();
        renderPay();
        showT('已刪除');
    });
}

function editPay(id) {
    const p = pays.find(x => x.id === id);
    if(!p) return;
    editingPayId = id;
    payCurrency = p.currency || 'rmb';
    payMethod = p.method;
    payPayer = p.payer;
    splitMode = p.split;

    renderPay(); 

    setTimeout(() => {
        const pn = document.getElementById('pn');
        const pa = document.getElementById('pa');
        const pnt = document.getElementById('pnt');
        if(pn) pn.value = p.name;
        if(pa) pa.value = p.amt;
        if(pnt) pnt.value = p.note || '';
        document.querySelector('.pay-form').scrollIntoView({behavior: 'smooth', block: 'center'});
    }, 50);
}

function cancelEditPay() {
    editingPayId = null;
    if(document.getElementById('pn')) document.getElementById('pn').value = '';
    if(document.getElementById('pa')) document.getElementById('pa').value = '';
    if(document.getElementById('pnt')) document.getElementById('pnt').value = '';
    renderPay();
}

let calcCurrency = 'rmb';
function setCalcCurr(curr) {
    calcCurrency = curr;
    document.getElementById('btnCurrRmb').classList.toggle('bpa', curr === 'rmb');
    document.getElementById('btnCurrTwd').classList.toggle('bpa', curr === 'twd');
    runCalc();
}

function syncRate(src) {
    const rmbEl = document.getElementById('calcRateRmb');
    const twdEl = document.getElementById('calcRateTwd');
    if (src === 'rmb') {
        const val = parseFloat(rmbEl.value);
        if (val > 0) twdEl.value = (1 / val).toFixed(3);
    } else {
        const val = parseFloat(twdEl.value);
        if (val > 0) rmbEl.value = (1 / val).toFixed(3);
    }
    runCalc();
}

function adjPpl(d){
  const el=document.getElementById('calcPpl');
  let v=parseInt(el.value)||1;
  v+=d; if(v<1)v=1;
  el.value=v; runCalc();
}

function runCalc(){
  const t=parseFloat(document.getElementById('calcTotal').value)||0;
  const p=parseInt(document.getElementById('calcPpl').value)||1;
  const rateRmbToTwd=parseFloat(document.getElementById('calcRateRmb').value)||4.5;

  const perPerson = t/p;
  let rmbAmt = 0;
  let twdAmt = 0;

  if(calcCurrency === 'rmb') {
      rmbAmt = perPerson;
      twdAmt = perPerson * rateRmbToTwd;
      document.getElementById('calcResult').innerHTML=`¥ ${rmbAmt.toFixed(1)}`;
      const twdEl = document.getElementById('calcResultTwd');
      if(twdEl) twdEl.textContent=`≈ NT$ ${Math.round(twdAmt)}`;
  } else {
      twdAmt = perPerson;
      rmbAmt = perPerson / rateRmbToTwd;
      document.getElementById('calcResult').innerHTML=`NT$ ${Math.round(twdAmt)}`;
      const twdEl = document.getElementById('calcResultTwd');
      if(twdEl) twdEl.textContent=`≈ ¥ ${rmbAmt.toFixed(1)}`;
  }

  document.getElementById('calcResult').dataset.rmb = rmbAmt;
  document.getElementById('calcResult').dataset.twd = twdAmt;
}

function quickAddCalc(shares){
  const t=parseFloat(document.getElementById('calcTotal').value)||0;
  if(t<=0) return showT('請先輸入總金額');
  
  let amt = 0;
  if(calcCurrency === 'twd'){
      payCurrency = 'twd';
      const twdAmt = parseFloat(document.getElementById('calcResult').dataset.twd) || 0;
      amt = Math.ceil(twdAmt * shares);
  } else {
      payCurrency = 'rmb';
      const rmbAmt = parseFloat(document.getElementById('calcResult').dataset.rmb) || 0;
      amt = Math.ceil(rmbAmt * shares);
  }
  
  const tabs=document.querySelectorAll('.ptab');
  const payTab = Array.from(tabs).find(t => t.textContent.includes('分帳'));
  switchPage('pay', payTab);
  
  setTimeout(()=>{
    const pn=document.getElementById('pn');
    const pa=document.getElementById('pa');
    const currPrefix = calcCurrency === 'twd' ? '台幣分攤' : '分攤';
    if(pn) pn.value=`${currPrefix} (${shares}人份)`;
    if(pa) pa.value=amt;
    renderPayForm(); 
    showT(`已帶入金額(${calcCurrency==='twd'?'台幣':'人民幣'})，請確認後記帳`);
  }, 50);
}

window.execTransfer = function(name, amtPerPerson, curr, shares) {
  editingPayId = null; 
  payCurrency = curr || 'rmb';
  splitMode = 'half'; 
  payPayer = '';      
  const amt = amtPerPerson * shares;
  
  const tabs=document.querySelectorAll('.ptab');
  const payTab = Array.from(tabs).find(t => t.textContent.includes('分帳'));
  switchPage('pay', payTab);
  
  setTimeout(()=>{
    const pn=document.getElementById('pn');
    const pa=document.getElementById('pa');
    if(pn) pn.value = `${name} (${shares}人份)`;
    if(pa) pa.value = amt > 0 ? amt : '';
    renderPayForm(); 
    showT(`已帶入${shares}人份，請確認金額與付款人後記帳`);
    document.querySelector('.pay-form').scrollIntoView({behavior: 'smooth', block: 'center'});
  }, 50);
}

window.exportToExcel = function() {
    if (typeof XLSX === 'undefined') {
        showT('⏳ 正在載入 Excel 匯出模組，請稍候...');
        let script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        script.onload = () => window.exportToExcel();
        document.head.appendChild(script);
        return;
    }

    const DNAMES = ['4/16','4/17','4/18','4/19','4/20','4/21'];
    
    // Sheet 1: 行程預估
    let estData = [["天數", "類型", "時間", "名稱", "預估花費", "幣別", "備註"]];
    let totalEstRmb = 0, totalEstTwd = 0;
    trips.forEach(t => {
        if(t.cost > 0) {
            let dayName = DNAMES[t.day] || `Day ${t.day+1}`;
            let typeName = ({sight:'景點',food:'餐廳',hotel:'住宿',transit:'交通'})[t.type] || t.type;
            let currName = t.curr === 'twd' ? 'NT$' : '¥';
            estData.push([dayName, typeName, t.time||'', t.name, t.cost, currName, t.note || ""]);
            if(t.curr === 'twd') totalEstTwd += t.cost;
            else totalEstRmb += t.cost;
        }
    });
    estData.push([]); 
    estData.push(["", "", "", "預估總計 (人民幣)", totalEstRmb, "¥", ""]);
    estData.push(["", "", "", "預估總計 (台幣)", totalEstTwd, "NT$", ""]);

    // Sheet 2: 實際分帳
    let payData = [["時間", "名稱", "金額", "幣別", "由誰付(墊付)", "誰該負擔", "付款方式", "備註"]];
    let totalPayRmb = 0, totalPayTwd = 0;
    pays.forEach(p => {
        let timeStr = p.time ? ftm(p.time) : '';
        let currName = p.currency === 'twd' ? 'NT$' : '¥';
        let payer = p.payer || '未指定';
        let splitText = ({half:'兩人共同',ruopei:'若佩個人',pinjun:'品郡個人',ar:'若佩代全付',ap:'品郡代全付'})[p.split] || p.split;
        if(payer === '各付各的') splitText = '兩人皆消費';
        let methodText = ({wechat:'微信',alipay:'支付寶',card:'信用卡',cash:'現金'})[p.method] || p.method;
        
        let actualAmt = p.payer === '各付各的' ? p.amt * 2 : p.amt;

        payData.push([timeStr, p.name, actualAmt, currName, payer, splitText, methodText, p.note || ""]);
        
        if(p.currency === 'twd') totalPayTwd += actualAmt;
        else totalPayRmb += actualAmt;
    });
    payData.push([]);
    payData.push(["", "實際支出總計 (人民幣)", totalPayRmb, "¥", "", "", "", ""]);
    payData.push(["", "實際支出總計 (台幣)", totalPayTwd, "NT$", "", "", "", ""]);

    // Sheet 3: 雙人結算總表
    const totals = calcTotals();
    const rBalRmb = totals.rPaidRmb - totals.rBearRmb; 
    const pBalRmb = totals.pPaidRmb - totals.pBearRmb;
    const rBalTwd = totals.rPaidTwd - totals.rBearTwd;
    const pBalTwd = totals.pPaidTwd - totals.pBearTwd;

    const rFinalTwd = rBalTwd + twd(rBalRmb);
    const pFinalTwd = pBalTwd + twd(pBalRmb);

    let balText = '兩人目前無欠款 🎉';
    if (rFinalTwd > 0) {
        balText = `品郡應給若佩 NT$${Math.round(rFinalTwd)} (含台幣差額 NT$${Math.round(rBalTwd)} + 人民幣差額 ¥${rBalRmb.toFixed(1)} 換算)`;
    } else if (pFinalTwd > 0) {
        balText = `若佩應給品郡 NT$${Math.round(pFinalTwd)} (含台幣差額 NT$${Math.round(pBalTwd)} + 人民幣差額 ¥${pBalRmb.toFixed(1)} 換算)`;
    }

    let settleData = [
        ["結算項目", "若佩", "品郡"],
        ["應負擔總額 (人民幣)", `¥${totals.rBearRmb.toFixed(1)}`, `¥${totals.pBearRmb.toFixed(1)}`],
        ["應負擔總額 (台幣)", `NT$${totals.rBearTwd.toFixed(0)}`, `NT$${totals.pBearTwd.toFixed(0)}`],
        ["------------------", "----------", "----------"],
        ["已墊付總額 (人民幣)", `¥${totals.rPaidRmb.toFixed(1)}`, `¥${totals.pPaidRmb.toFixed(1)}`],
        ["已墊付總額 (台幣)", `NT$${totals.rPaidTwd.toFixed(0)}`, `NT$${totals.pPaidTwd.toFixed(0)}`],
        ["------------------", "----------", "----------"],
        ["代墊差額 (人民幣)", `¥${rBalRmb.toFixed(1)}`, `¥${pBalRmb.toFixed(1)}`],
        ["代墊差額 (台幣)", `NT$${rBalTwd.toFixed(0)}`, `NT$${pBalTwd.toFixed(0)}`],
        [],
        ["最終台幣結算結果", balText, ""]
    ];

    const wb = XLSX.utils.book_new();
    const ws1 = XLSX.utils.aoa_to_sheet(estData);
    const ws2 = XLSX.utils.aoa_to_sheet(payData);
    const ws3 = XLSX.utils.aoa_to_sheet(settleData);

    // 簡單設定欄寬
    ws1['!cols'] = [{wch:15}, {wch:12}, {wch:10}, {wch:35}, {wch:12}, {wch:8}, {wch:35}];
    ws2['!cols'] = [{wch:20}, {wch:35}, {wch:12}, {wch:8}, {wch:15}, {wch:15}, {wch:12}, {wch:35}];
    ws3['!cols'] = [{wch:25}, {wch:40}, {wch:40}];

    XLSX.utils.book_append_sheet(wb, ws1, "行程預估");
    XLSX.utils.book_append_sheet(wb, ws2, "實際分帳明細");
    XLSX.utils.book_append_sheet(wb, ws3, "雙人結算總表");

    XLSX.writeFile(wb, "南京旅行手帳_費用報表.xlsx");
    showT('✅ 已成功匯出 Excel 檔案');
};

function renderLedger(){
  const DNAMES=['4/16','4/17','4/18','4/19','4/20','4/21'];
  const tripItems = trips.filter(x=>x.cost>0).map(x=>({
    src:'trip', day:x.day, name:x.name.replace(/^[\u{1F300}-\u{1FAFF}\s]*/u,'').trim(), amt:x.cost, currency: x.curr || 'rmb', note:'行程預估 / 人', icon: ({sight:'🏛',food:'🍜',hotel:'🏨',transit:'🚄'})[x.type]||'📌'
  }));
  const payItems = pays.map(x=>({
    src:'pay', day:-1, name:x.name, amt:x.amt, currency:x.currency||'rmb', note:({half:'兩人共同',ruopei:'若佩個人',pinjun:'品郡個人',ar:'若佩代全付',ap:'品郡代全付'})[x.split]||x.split, icon:({wechat:'💚',alipay:'💙',card:'💳',cash:'💵'})[x.method]||'💴', payer:x.payer, time:x.time
  }));

  let tripTotalRmb = 0, tripTotalTwd = 0;
  tripItems.forEach(x => {
      if(x.currency === 'twd') tripTotalTwd += x.amt;
      else tripTotalRmb += x.amt;
  });
  
  let payTotalRmb = 0, payTotalTwd = 0;
  payItems.forEach(x => { 
      let actualAmt = (x.payer === '各付各的') ? x.amt * 2 : x.amt;
      if(x.currency === 'twd') payTotalTwd+=actualAmt; 
      else payTotalRmb+=actualAmt; 
  });

  const grandTotalRmb = tripTotalRmb + payTotalRmb;
  const grandTotalTwd = tripTotalTwd + payTotalTwd;

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:16px;font-weight:700;color:var(--ink);">📊 全覽與備份</div>
      <button onclick="exportToExcel()" style="background:var(--accent2);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px" title="下載所有資料為完整的 Excel 檔案">📤 匯出 Excel</button>
  </div>
  <div class="ledger-summary">
    <div class="ls-card"><div class="ls-label">行程預估合計</div><div class="ls-amt" style="font-size:16px">¥${tripTotalRmb.toFixed(0)}<br><span style="color:var(--accent3)">NT$${tripTotalTwd.toFixed(0)}</span></div><div class="ls-twd">≈ NT$${Math.round(twd(tripTotalRmb) + tripTotalTwd)}</div></div>
    <div class="ls-card"><div class="ls-label">已記帳合計</div><div class="ls-amt" style="font-size:16px">¥${payTotalRmb.toFixed(0)}<br><span style="color:var(--accent3)">NT$${payTotalTwd.toFixed(0)}</span></div><div class="ls-twd">≈ NT$${Math.round(twd(payTotalRmb)+payTotalTwd)}</div></div>
    <div class="ls-card"><div class="ls-label">總計估值(估+帳)</div><div class="ls-amt" style="font-size:16px">¥${grandTotalRmb.toFixed(0)}<br><span style="color:var(--accent3)">NT$${grandTotalTwd.toFixed(0)}</span></div><div class="ls-twd">≈ NT$${Math.round(twd(grandTotalRmb)+grandTotalTwd)}</div></div>
  </div>`;

  if(tripItems.length){
    const byDay = {};
    tripItems.forEach(x=>{ if(!byDay[x.day]) byDay[x.day]=[]; byDay[x.day].push(x); });
    Object.keys(byDay).sort((a,b)=>a-b).forEach(d=>{
      const items = byDay[d];
      
      const dayTotalRmb = items.filter(x=>x.currency!=='twd').reduce((s,x)=>s+x.amt,0);
      const dayTotalTwd = items.filter(x=>x.currency==='twd').reduce((s,x)=>s+x.amt,0);
      const dayTwdEq = Math.round(twd(dayTotalRmb) + dayTotalTwd);
      let dayTotalText = [];
      if(dayTotalRmb>0) dayTotalText.push(`¥${dayTotalRmb}`);
      if(dayTotalTwd>0) dayTotalText.push(`NT$${dayTotalTwd}`);
      const dayTotalStr = dayTotalText.join(' + ') + ` ≈ NT$${dayTwdEq}`;

      html += `<div class="ledger-group">
        <div class="lg-head">🗓 Day ${parseInt(d)+1}・${DNAMES[d]}<span class="lg-total">${dayTotalStr}</span></div>
        ${items.map(x=>{
            const isTwd = x.currency === 'twd';
            return `<div class="ledger-row lr-src-trip">
              <span class="lr-icon">${x.icon}</span>
              <div class="lr-body"><div class="lr-name">${eh(x.name)}</div><div class="lr-meta">${x.note}</div></div>
              <div><div class="lr-amt" ${isTwd?'style="color:var(--accent3)"':''}>${isTwd?'NT$':'¥'}${x.amt}</div><span class="lr-twd">${isTwd?`≈ ¥${(x.amt/cnyToTwd).toFixed(1)}`:`≈ NT$${twd(x.amt)}`}</span></div>
            </div>`
        }).join('')}
      </div>`;
    });
  }

  if(payItems.length){
    html += `<div class="ledger-group">
      <div class="lg-head">💰 已記帳支出<span class="lg-total">¥${payTotalRmb.toFixed(0)} + NT$${payTotalTwd.toFixed(0)}</span></div>
      ${[...payItems].reverse().map(x=>{
        const isTwd = x.currency === 'twd';
        const isSelfPaid = x.payer === '各付各的';
        const payerDisplay = x.payer ? (isSelfPaid ? ' · 各付各的' : ' · '+x.payer+'墊付') : '';
        const displayAmt = isSelfPaid ? `${x.amt.toFixed(0)}/人` : x.amt.toFixed(0);
        const twdHint = isSelfPaid ? `≈ NT$${twd(x.amt)}/人` : `≈ NT$${twd(x.amt)}`;
        const timeHtml = x.time ? ` · 🕒 ${ftm(x.time)}` : '';

        return `<div class="ledger-row lr-src-pay">
          <span class="lr-icon">${x.icon}</span>
          <div class="lr-body"><div class="lr-name">${eh(x.name)}</div><div class="lr-meta">${isSelfPaid ? '兩人皆消費' : x.note}${payerDisplay}${timeHtml}</div></div>
          <div><div class="lr-amt" ${isTwd?'style="color:var(--accent3)"':''}>${isTwd?'NT$':'¥'}${displayAmt}</div>${isTwd?'':`<span class="lr-twd">${twdHint}</span>`}</div>
        </div>`
      }).join('')}
    </div>`;
  }

  if(!tripItems.length && !payItems.length){
    html += '<div class="empty-day" style="padding:40px">📋<br>還沒有費用記錄</div>';
  }

  document.getElementById('ledgerContent').innerHTML = html;
}

function switchPage(p,btn){
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.querySelectorAll('.page-section').forEach(s=>s.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('addBtn').style.display=p==='itinerary'?'':'none';
  if(p==='itinerary')renderIt();
  else if(p==='checklist')renderCL();
  else if(p==='disney')renderDis();
  else if(p==='food')renderFd();
  else if(p==='ledger')renderLedger();
  else if(p==='pay')renderPay();
}

}

function closeModal(){document.getElementById('mo').classList.remove('open');}

function saveItem(){
  const n=document.getElementById('fName').value.trim();
  if(!n){showT('請輸入名稱');return;}
  const timeVal = document.getElementById('fTime').value || '12:00';
  
  const x={
    id:editId||nid++,
    day:parseInt(document.getElementById('fDay').value),
    time:timeVal,
    type:document.getElementById('fType').value,
    name:n,
    address:document.getElementById('fAddr').value.trim(),
    phone:document.getElementById('fPhone').value.trim(),
    cost:parseFloat(document.getElementById('fCost').value)||0,
    curr:document.getElementById('fCurr').value,
    note:document.getElementById('fNote').value.trim()
  };
  
  if(editId){const i=trips.findIndex(t=>t.id===editId);trips[i]=x;}else trips.push(x);
  curDay=x.day;
  closeModal();
  renderIt();
  showT(editId?'✓ 已更新':'✓ 已新增');
}

function deleteItem(){
    customConfirm('確定要刪除這個行程嗎？', () => {
        trips=trips.filter(x=>x.id!==editId);
        closeModal();
        renderIt();
        showT('已刪除');
    });
}
document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)closeModal();});

function showT(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function eh(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function eq(s){return String(s||'').replace(/'/g,"\\'").replace(/\n/g,' ');}

window.applyState = applyState;

<!-- 🔥 FIREBASE REAL-TIME SYNC MODULE 🔥 -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let fStoreDocRef = null;
    let fAuthUser = null;
    let isFirebaseReady = false;

    async function setupFirebase() {
        let connTimeout = setTimeout(() => {
            window.setSyncDot('offline');
        }, 8000);

        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'nanjing-trip-app';

            if (!firebaseConfig) {
                console.warn("⚠️ 系統環境缺少 Firebase 設定，已降級為本機模式。");
                clearTimeout(connTimeout);
                window.setSyncDot('offline');
                return;
            }

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            fAuthUser = auth.currentUser;
            
            fStoreDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'nanjing_trip_2025', 'shared_state');
            isFirebaseReady = true;

            onSnapshot(fStoreDocRef, { includeMetadataChanges: true }, (docSnap) => {
                clearTimeout(connTimeout);
                
                if (docSnap.metadata && docSnap.metadata.fromCache) {
                    window.setSyncDot('offline');
                } else {
                    window.setSyncDot('ok');
                }

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    window.applyState(data);
                    window.refreshCurrentPage();
                } else {
                    if(window.sv) window.sv();
                }
            }, (error) => {
                clearTimeout(connTimeout);
                console.error("即時連線發生中斷:", error);
                window.setSyncDot('offline');
            });

        } catch (e) {
            clearTimeout(connTimeout);
            console.error("雲端連線失敗:", e);
            window.setSyncDot('offline');
        }
    }

    // 將帶有 Firebase 連線邏輯的 sv() 綁定回全域
    window.sv = async function() {
        const data = window.packState();
        try { localStorage.setItem('nanjing2025_state', JSON.stringify(data)); } catch(e){}

        if (isFirebaseReady && fStoreDocRef && fAuthUser) {
            window.setSyncDot('syncing');
            try {
                await setDoc(fStoreDocRef, data);
                window.setSyncDot('ok');
            } catch(e) {
                console.error("同步至雲端失敗:", e);
                window.setSyncDot('offline');
            }
        } else {
            window.setSyncDot('offline');
        }
    }

    setupFirebase();
</script>
